<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>bunny game</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
    ></script>

    <style>
                                            body {
                                                margin: 0;
                                                  overflow: hidden;

                                                    background: url("binkyb.png") center/cover no-repeat;

                                            }

                                            #score {
                                              position: fixed;
                                              top: 20px;
                                              left: 20px;
                                              color: white;
                                              font-size: 20px;
                                              z-index: 10;
                                            }

                                            .bunny {
                                              position: fixed;
                                              width: 60px;
                                              cursor: pointer;
                                              transition:
                                                  left 1s linear,
                                                    top 1s linear;
                                              z-index:5;
                          animation: bunnyWiggle 1.5s infinite ease-in-out;
                                            }

                    bunny:active {
                    scale: 0.8;
                    }
      @keyframes bunnyWiggle {
          0% {
              transform:
                    rotate(-5deg)
                          scale(1);
                            }

                              25% {
                                  transform:
                                        rotate(5deg)
                                              scale(1.12);
                                                }

                                                  50% {
                                                      transform:
                                                            rotate(-5deg)
                                                                  scale(1);
                                                                    }

                                                                      75% {
                                                                          transform:
                                                                                rotate(5deg)
                                                                                      scale(1.14);
                                                                                        }

                                                                                          100% {
                                                                                              transform:
                                                                                                    rotate(-5deg)
                                                                                                          scale(1);
                                                                                                            }
                                                                                                            }




                                .spin {
                                    animation: bunnySpin 0.8s linear;
                                    bunnyWiggle 0.6s infinite ease-in-out;

                                 }

            .evil {
                filter:
                    brightness(1.5)
                        saturate(8)
                            hue-rotate(-40deg)
                                drop-shadow(0 0 15px red)
                                    drop-shadow(0 0 30px red)
                                        drop-shadow(0 0 45px red);
                                        }


                                    @keyframes evilPulse {
                                from {
                                    scale: 1;
                                      }

                                        to {
                                            scale: 1.08;
                                              }
                                              }



                                @keyframes bunnySpin {
                                    from {
                                        transform: rotate(0deg);
                                          }

                                            to {
                                                transform: rotate(360deg);
                                                  }
                                                }


                                            .bunny:active {
                                          scale: 0,8;
                                         }

                                            .boss {
                                              position: fixed;

                                              width: 70px;
                                              height: 70px;


                                              contain: none;

                                              background: transparent;







                                              z-index: 5;
                                              cursor: pointer;
                                              animation: float 2s ease-in-out infinite;
                                            }

                                            /* Добавь ЭТО — пробиваем shadow DOM model-viewer */
                                            .boss::part(default) {
                                              overflow: visible;
                                              }

                                              model-viewer {
                                                overflow: visible;
                                                  --poster-color: transparent;
                                                  }

                                            @keyframes float {
                                              0% {
                                                transform: translateY(0px);
                                              }
                                              50% {
                                                transform: translateY(-20px);
                                              }
                                              100% {
                                                transform: translateY(0px);
                                              }
                                              button
                                              position: fixed;
                                              top: 20px;
                                              right: 20px;
                                              z-index: 10;

                                            }
    </style>
  </head>

  <body>
    <img src="bong.png" class="pulse-bg" />

    <audio id="bgMusic"></audio>
    <div id="score">0</div>
    <div class="title">NEWJEANS GAME ZONE</div>
    <div class="player">
      <img src="player.png" class="player-bg" id="playerImg" />

      <div class="controls">
        <div class="btn prev" onclick="prevTrack()"></div>
        <div class="btn play" onclick="toggleMusic()"></div>
        <div class="btn next" onclick="nextTrack()"></div>
      </div>
    </div>

    <script>
      let score = 0;
      let bunnyCount = 1;
      let idleTimer;

      const scoreEl = document.getElementById("score");

      const boomSound = new Audio("danibomb.wav");

      boomSound.volume = 0.7;

      const warningSound = new Audio("warning1.mp3");

      const bossSound = new Audio("bossv.mp3");

      bossSound.volume = 1;

      warningSound.volume = 0.7;

      const music = document.getElementById("bgMusic");

      const tracks = [
        "https://res.cloudinary.com/dnxk3qkqz/video/upload/v1776557808/ETA_jrggdx.mp3",
        "https://res.cloudinary.com/dnxk3qkqz/video/upload/v1776557807/zero_tdqppi.mp3",
        "https://res.cloudinary.com/dnxk3qkqz/video/upload/v1776557789/omg_yej0jq.mp3",
        "https://res.cloudinary.com/dnxk3qkqz/video/upload/v1776557789/super_shy_dikc4x.mp3",
        "https://res.cloudinary.com/dnxk3qkqz/video/upload/v1776557787/attention_ufwdl3.mp3",
        "https://res.cloudinary.com/dnxk3qkqz/video/upload/v1776557762/cookie_mbt414.mp3",
        "https://res.cloudinary.com/dnxk3qkqz/video/upload/v1776557761/hurt_pyyfvw.mp3",
        "https://res.cloudinary.com/dnxk3qkqz/video/upload/v1776557760/supernatural_boaucr.mp3",
        "https://res.cloudinary.com/dnxk3qkqz/video/upload/v1776557740/bubble_gum_nhitgl.mp3",
        "https://res.cloudinary.com/dnxk3qkqz/video/upload/v1776557739/how_sweet_cn5swc.mp3",
        "https://res.cloudinary.com/dnxk3qkqz/video/upload/v1776557736/get_up_wk9nm9.mp3",
        "https://res.cloudinary.com/dnxk3qkqz/video/upload/v1776557716/ditto_ny1f34.mp3",
        "https://res.cloudinary.com/dnxk3qkqz/video/upload/v1776557716/new_jeans_xa2npi.mp3",
        "https://res.cloudinary.com/dnxk3qkqz/video/upload/v1776557716/cool_with_you_h4qu9n.mp3",
        "https://res.cloudinary.com/dnxk3qkqz/video/upload/v1776557692/gods_bkef2z.mp3",
        "https://res.cloudinary.com/dnxk3qkqz/video/upload/v1776557692/hype_boy_by1ppv.mp3",
        "https://res.cloudinary.com/dnxk3qkqz/video/upload/v1776557692/right_now_rw8hy8.mp3",
        "https://res.cloudinary.com/dnxk3qkqz/video/upload/v1776557225/asap_epho69.mp3",
      ];

      let currentTrack = 0;
      let musicStarted = false;

      function loadTrack(index) {
        currentTrack = index;

        if (currentTrack >= tracks.length) currentTrack = 0;
        if (currentTrack < 0) currentTrack = tracks.length - 1;

        music.pause(); // 💥 важно
        music.src = tracks[currentTrack];
        music.currentTime = 0;
        music.load(); // 💥 важно
        music.play();

        document.getElementById("playerImg").src = "player.png";
      }

      function startMusic() {
        if (!musicStarted) {
          loadTrack(0);
          music.volume = 0.3;
          musicStarted = true;
        }
      }

      function nextTrack() {
        loadTrack(currentTrack + 1);
      }

      function prevTrack() {
        loadTrack(currentTrack - 1);
      }

      function toggleMusic() {
        const img = document.getElementById("playerImg");

        if (music.paused) {
          music.play();
          img.src = "player.png";
        } else {
          music.pause();
          img.src = "playerplay.png";
        }
      }

      music.onended = () => {
        loadTrack(currentTrack + 1);
      };

      function spawnBunny() {
        const bunny = document.createElement("img");

        const isEvil = Math.random() < 0.15;

        if (isEvil) {
          bunny.src = "redbunny.png";
          bunny.classList.add("evil");

          setInterval(() => {
            bunny.style.scale = bunny.style.scale === "1.1" ? "1" : "1.1";
          }, 300);

          setTimeout(() => {
            bunny.remove();
          }, 3000);
        } else {
          bunny.src = "bunnytest.png";
        }

        bunny.className = "bunny";

        moveBunny(bunny);
        animateBunny(bunny);

        bunny.onclick = () => {
          bunny.remove(); // удаляем ТОЛЬКО его

          if (isEvil) {
            warningSound.currentTime = 0;

            warningSound.play();

            document.body.classList.add("warning-flash");

            setTimeout(() => {
              document.body.classList.remove("warning-flash");
            }, 250);

            score -= 1000;
          } else {
            score += 10;
          }

          scoreEl.textContent = score;
          if (score <= -100) {
            scoreEl.style.fontSize = "8px";
          } else if (score <= -10) {
            scoreEl.style.fontSize = "9px";
          } else {
            scoreEl.style.fontSize = "12px";
          }

          if (isEvil) {
            scoreEl.style.color = "red";

            setTimeout(() => {
              scoreEl.style.color = "white";
            }, 300);
          }

          if (score >= 1000) {
            scoreEl.style.fontSize = "10px";
          }

          if (score >= 10000) {
            scoreEl.style.fontSize = "8px";
          }

          spawnBunny(); // добавляем нового

          // каждые 5 очков увеличиваем сложность
          if (score % 50 === 0 && bunnyCount < 6) {
            bunnyCount++;
            spawnBunny();
          }

          // шанс появления босса
          if (Math.random() < 0.08) {
            spawnBoss();
          }

          startMusic();
          resetIdleTimer();
        };
        document.body.appendChild(bunny);
      }

      function spawnBomb() {
        const bomb = document.createElement("img");

        bomb.src = "bombb.png";

        bomb.classList.add("bomb");

        bomb.style.left = Math.random() * (window.innerWidth - 120) + "px";

        bomb.style.top = Math.random() * (window.innerHeight - 120) + "px";

        bomb.onclick = () => {
          boomSound.currentTime = 0;

          boomSound.play();

          // 💥 экран трясётсятрясётся
          document.body.classList.add("boom");

          setTimeout(() => {
            document.body.classList.remove("boom");
          }, 300);

          // 🐰 удалить bunny
          document.querySelectorAll(".bunny").forEach((b) => b.remove());

          // 💰 бонус
          score += 5000;

          const bonus = document.createElement("div");

          bonus.classList.add("bonus-text");

          bonus.innerHTML = `
                    <span style="color:#4da6ff">+</span>
                    <span style="color:#ff66cc">5</span>
                    <span style="color:#ffd84d">0</span>
                    <span style="color:#66ff99">0</span>
                    <span style="color:#c084ff">0</span>
                    `;

          document.body.appendChild(bonus);

          setTimeout(() => {
            bonus.remove();
          }, 1000);

          scoreEl.textContent = score;

          // 💣 удалить bomb
          bomb.remove();

          // 🐰 заново спавним bunny
          for (let i = 0; i < bunnyCount; i++) {
            spawnBunny();
          }
        };

        document.body.appendChild(bomb);

        // исчезает сама
        setTimeout(() => {
          bomb.remove();
        }, 5000);
      }

      function spawnBoss() {
        const boss = document.createElement("model-viewer");

        boss.src = "./bbunny.glb";
        boss.className = "boss";

        boss.setAttribute("auto-rotate", "");
        boss.setAttribute("rotation-per-second", "35deg");

        boss.setAttribute("camera-orbit", "0deg 75deg 1000%");
        boss.setAttribute("field-of-view", "25deg");

        boss.setAttribute("animation-name", "*");
        boss.setAttribute("autoplay", "");

        boss.setAttribute("disable-zoom", "");
        boss.setAttribute("interaction-prompt", "none");

        moveBoss(boss);

        // 💥 клик
        boss.onclick = () => {
          bossSound.currentTime = 0;
          bossSound.play();

          document.body.classList.add("boss-flash");

          setTimeout(() => {
            document.body.classList.remove("boss-flash");
          }, 400);

          score += 500;
          scoreEl.textContent = score;

          if (Math.random() < 0.1) {
            spawnBomb();
          }
          if (score >= 1000) {
            scoreEl.style.fontSize = "10px";
          }

          if (score >= 10000) {
            scoreEl.style.fontSize = "8px";
          }

          boss.remove();
        };

        document.body.appendChild(boss);

        // ⏱ исчезает через 4 секунды
        setTimeout(() => {
          boss.remove();
        }, 4000);

        // 🏃 двигается каждые 0.5 сек
        const interval = setInterval(() => {
          if (!document.body.contains(boss)) {
            clearInterval(interval);
            return;
          }
          moveBoss(boss);
        }, 500);
      }

      function moveBunny(el) {
        const width = el.offsetWidth || 60;
        const height = el.offsetHeight || 60;

        el.style.left = Math.random() * (window.innerWidth - width) + "px";
        el.style.top = Math.random() * (window.innerHeight - height) + "px";
      }
      function animateBunny(el) {
        const interval = setInterval(() => {
          if (!document.body.contains(el)) {
            clearInterval(interval);
            return;
          }

          const x = Math.random() * (window.innerWidth - 80);

          const y = Math.random() * (window.innerHeight - 80);

          el.style.left = x + "px";
          el.style.top = y + "px";

          if (Math.random() < 0.2) {
            el.classList.add("spin");

            setTimeout(() => {
              el.classList.remove("spin");
            }, 800);
          }
        }, 1200);
      }

      function moveBoss(el) {
        const padding = 100;

        const x = padding + Math.random() * (window.innerWidth - padding * 2);
        const y = padding + Math.random() * (window.innerHeight - padding * 2);

        el.style.left = x + "px";
        el.style.top = y + "px";
      }

      function resetIdleTimer() {
        clearTimeout(idleTimer);

        idleTimer = setTimeout(() => {
          const current = document.querySelectorAll(".bunny").length;

          for (let i = current; i < bunnyCount; i++) {
            spawnBunny();
          }
        }, 15000);
      }

      for (let i = 0; i < bunnyCount; i++) {
        spawnBunny();
      }
      resetIdleTimer();
      setInterval(() => {
        if (Math.random() < 0.08) {
          spawnBomb();
        }
      }, 5000);

      setInterval(() => {
        const alive = document.querySelectorAll(".bunny").length;

        if (alive < bunnyCount) {
          for (let i = alive; i < bunnyCount; i++) {
            spawnBunny();
          }
        }
      }, 1000);
    </script>
  </body>
</html>
